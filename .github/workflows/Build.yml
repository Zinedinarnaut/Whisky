name: Build

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build WhiskyKit
        run: |
          cd WhiskyKit
          swift build

      - name: Build Whisky app
        run: |
          xcodebuild -project Whisky.xcodeproj \
            -scheme Whisky \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build WhiskyCmd
        run: |
          xcodebuild -project Whisky.xcodeproj \
            -scheme WhiskyCmd \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
