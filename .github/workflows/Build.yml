name: Build

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build VectorKit
        run: |
          cd VectorKit
          swift build

      - name: Build Vector app
        run: |
          xcodebuild -project Vector.xcodeproj \
            -scheme Vector \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build VectorCmd
        run: |
          xcodebuild -project Vector.xcodeproj \
            -scheme VectorCmd \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
